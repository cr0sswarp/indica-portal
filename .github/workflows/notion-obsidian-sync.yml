# ════════════════════════════════════════════════════════════════
# notion-obsidian-sync — Notion → Obsidian Vault 毎日同期
# ════════════════════════════════════════════════════════════════
#
# 📌 必要な GitHub Secrets:
#   - NOTION_TOKEN             : Notion Integration トークン
#   - NOTION_PAGE_ID           : 株価ページID
#   - NOTION_HUB_PAGE_ID       : 外部脳ハブページID（任意）
#
# 📱 Obsidian セットアップ（ローカル）:
#   1. Obsidian で「このリポジトリ」を Vault として開く
#   2. Community plugins → "Obsidian Git" をインストール
#   3. 設定: Auto pull interval = 60分
#   4. 設定: Auto push after commit delay = 5分
#   → 起動するたびに最新Notionデータが自動 pull される
#
# ════════════════════════════════════════════════════════════════

name: "📓 notion-obsidian-sync — Notion→Obsidian 毎日同期"

on:
  schedule:
    # 毎日 06:55 JST (= UTC 前日 21:55) — daily-brief より5分前
    - cron: "55 21 * * *"

  workflow_dispatch:
    inputs:
      note:
        description: "手動実行メモ（任意）"
        required: false
        default: "手動トリガー"

jobs:
  sync-notion-to-obsidian:
    name: "Notion → Obsidian Vault 同期"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 リポジトリ取得"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: "🐍 Python セットアップ"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 ライブラリインストール"
        run: pip install notion-client

      - name: "📓 Notion → Markdown エクスポート"
        env:
          NOTION_TOKEN:        ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID:      ${{ secrets.NOTION_PAGE_ID }}
          NOTION_HUB_PAGE_ID:  ${{ secrets.NOTION_HUB_PAGE_ID }}
        run: python scripts/notion_export.py

      - name: "🔧 Git 設定"
        run: |
          git config user.name  "VALIENTE COO Bot"
          git config user.email "makino@indicalab.jp"

      - name: "📤 変更をコミット・プッシュ"
        run: |
          git add obsidian/
          if git diff --staged --quiet; then
            echo "変更なし — スキップ"
          else
            git commit -m "sync: Notion → Obsidian $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST')"
            git push origin ${{ github.ref_name }}
            echo "✅ Obsidian vault を更新しました"
          fi

      - name: "📋 実行サマリー"
        if: always()
        run: |
          echo "## 📓 Notion → Obsidian 同期完了" >> $GITHUB_STEP_SUMMARY
          echo "- 実行時刻 (JST): $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- Vault: \`obsidian/\` フォルダ" >> $GITHUB_STEP_SUMMARY
          echo "- Obsidian Git プラグインで自動 pull されます" >> $GITHUB_STEP_SUMMARY
