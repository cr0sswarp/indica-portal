# ════════════════════════════════════════════════════════════════
# daily-brief — VALIENTE 統合朝ブリーフィング
# 毎朝 7:00 JST に Notion 優先事項を読み取り → HTML メール送信
# ════════════════════════════════════════════════════════════════
#
# 📌 必要な GitHub Secrets:
#   - ANTHROPIC_API_KEY        : Anthropic Console から取得
#   - GMAIL_ADDRESS            : makino@indicalab.jp
#   - GMAIL_APP_PASSWORD       : Google アプリパスワード
#   - NOTION_TOKEN             : Notion Integration トークン
#   - NOTION_PAGE_ID           : 株価分析ページID
#   - NOTION_NAKAJIMA_PAGE_ID  : 中嶋メルマガページID
#   - NOTION_FOUNDATION_PAGE_ID: 財団設立ページID（任意）
#   - BRIEF_TO                 : 送信先メール（省略時は GMAIL_ADDRESS）
#
# ════════════════════════════════════════════════════════════════

name: "🌅 daily-brief — VALIENTE 統合朝ブリーフィング"

on:
  schedule:
    # 毎日 07:00 JST (= UTC 前日 22:00)
    - cron: "0 22 * * *"

  workflow_dispatch:
    inputs:
      note:
        description: "手動実行メモ（任意）"
        required: false
        default: "手動トリガー"

jobs:
  send-daily-brief:
    name: "朝ブリーフィング生成・送信"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 リポジトリ取得"
        uses: actions/checkout@v4

      - name: "🐍 Python セットアップ"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 ライブラリインストール"
        run: |
          pip install anthropic notion-client requests reportlab
          sudo apt-get install -y fonts-noto-cjk

      - name: "🌅 ブリーフィング生成・送信"
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:              ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:         ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTION_TOKEN:               ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID:             ${{ secrets.NOTION_PAGE_ID }}
          NOTION_NAKAJIMA_PAGE_ID:    ${{ secrets.NOTION_NAKAJIMA_PAGE_ID }}
          NOTION_FOUNDATION_PAGE_ID:  ${{ secrets.NOTION_FOUNDATION_PAGE_ID }}
          BRIEF_TO:                   ${{ secrets.BRIEF_TO }}
        run: python scripts/daily_brief.py

      - name: "📎 HTML ブリーフを成果物としてアップロード"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-brief-${{ github.run_id }}
          path: output/brief_*.html
          retention-days: 14

      - name: "📋 実行サマリー"
        if: always()
        run: |
          echo "## 🌅 VALIENTE Daily Brief 完了" >> $GITHUB_STEP_SUMMARY
          echo "- 実行時刻 (JST): $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- 送信先: ${{ secrets.BRIEF_TO || secrets.GMAIL_ADDRESS }}" >> $GITHUB_STEP_SUMMARY
          echo "- HTML は Actions タブの Artifacts から確認可能" >> $GITHUB_STEP_SUMMARY
