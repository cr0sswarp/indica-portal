# 小物体・広角カメラ向けByteTrack設定
# track_buffer延長で一時的な見失いに耐え、tracklet断片化を抑える
tracker_type: bytetrack
track_high_thresh: 0.25   # 第1段マッチ閾値 (デフォルト0.5→0.25: 低信頼検出も拾う)
track_low_thresh: 0.10    # 第2段マッチ閾値 (デフォルト0.1)
new_track_thresh: 0.40    # 新規トラック生成閾値 (デフォルト0.6→0.40)
track_buffer: 90          # 見失い許容フレーム数 (デフォルト30→90: 3秒間ID保持)
match_thresh: 0.85        # IoUマッチ閾値 (デフォルト0.8→0.85: より寛容に再接続)
fuse_score: True
